<!DOCTYPE html>
<html>
<body>
<div id="svg-container"></div>
<script>
  fetch("logo.svg")
    .then(r => r.text())
    .then(text => {
      document.getElementById("svg-container").innerHTML = text;
      const svg = document.querySelector("svg");
      const paths = document.querySelectorAll("path");
      
      // Let us get the bounding box of path 13 (the book) to find the center
      const book = paths[12];
      const bookBox = book.getBBox();
      const center_x = bookBox.x + bookBox.width / 2;
      
      // Arc box
      const arc = paths[0];
      const arcBox = arc.getBBox();
      
      document.body.innerHTML += `<p id="result">Book Center X: ${center_x}, Arc Right Edge: ${arcBox.x + arcBox.width}</p>`;
    });
</script>
</body>
</html>
